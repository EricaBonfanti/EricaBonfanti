name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */5 * * *"  # Atualiza a cada 5 horas
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: EricaBonfanti
          outputs: dist/github-contribution-grid-snake.svg, dist/github-contribution-grid-snake.gif

      - name: Commit and push if changed
        run: |
          git config --global user.email "164363268+EricaBonfanti@users.noreply.github.com"
          git config --global user.name "Érica Bonfanti Corrêa"
          git add dist/
          git diff --cached --quiet || git commit -m "Atualiza snake animation" && git push

      - name: Push SVG to output branch
        uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
